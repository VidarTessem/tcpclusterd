<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">How tcpclusterd Works</title>
  <desc id="desc">Diagram showing the PUBLIC, PRIVATE and LOG access models in tcpclusterd.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#142845"/>
      <stop offset="100%" stop-color="#0b1527"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#253c5f"/>
      <stop offset="100%" stop-color="#1b2b45"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22863a"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f08c2e"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <g fill="none" stroke="#7ea6d9" stroke-opacity="0.18" stroke-width="3">
    <path d="M0 65 C80 35, 130 100, 220 70 S360 35, 450 78 S590 95, 690 58 S850 35, 940 74 S1090 95, 1200 52"/>
    <path d="M0 105 C70 70, 120 130, 210 98 S350 68, 445 108 S600 130, 710 90 S860 68, 950 110 S1095 128, 1200 86"/>
    <g fill="#87aee0" stroke="none">
      <circle cx="55" cy="88" r="7"/><circle cx="110" cy="67" r="7"/><circle cx="165" cy="83" r="7"/>
      <circle cx="255" cy="87" r="7"/><circle cx="320" cy="63" r="7"/><circle cx="390" cy="80" r="7"/>
      <circle cx="478" cy="95" r="7"/><circle cx="548" cy="71" r="7"/><circle cx="625" cy="94" r="7"/>
      <circle cx="734" cy="73" r="7"/><circle cx="807" cy="82" r="7"/><circle cx="892" cy="68" r="7"/>
      <circle cx="980" cy="92" r="7"/><circle cx="1050" cy="73" r="7"/><circle cx="1126" cy="86" r="7"/>
    </g>
  </g>

  <text x="600" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#ffffff">How <tspan fill="#8fb9ff">tcpclusterd</tspan> Works</text>

  <g filter="url(#shadow)">
    <rect x="40" y="120" width="350" height="540" rx="12" fill="url(#panel)" stroke="#7e97bc" stroke-width="2"/>
    <rect x="425" y="120" width="350" height="540" rx="12" fill="url(#panel)" stroke="#7e97bc" stroke-width="2"/>
    <rect x="810" y="120" width="350" height="540" rx="12" fill="url(#panel)" stroke="#7e97bc" stroke-width="2"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff">
    <text x="215" y="175" text-anchor="middle" font-size="34" font-weight="700">PUBLIC</text>
    <text x="600" y="175" text-anchor="middle" font-size="34" font-weight="700">PRIVATE</text>
    <text x="985" y="175" text-anchor="middle" font-size="34" font-weight="700">LOG</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#d7e5ff">
    <text x="215" y="250" text-anchor="middle" font-size="62">🌐</text>
    <text x="600" y="250" text-anchor="middle" font-size="62">🔒</text>
    <text x="985" y="250" text-anchor="middle" font-size="62">📝</text>
  </g>

  <g stroke="#8ca6cc" stroke-width="2">
    <line x1="55" y1="215" x2="375" y2="215"/>
    <line x1="440" y1="215" x2="760" y2="215"/>
    <line x1="825" y1="215" x2="1145" y2="215"/>
    <line x1="55" y1="310" x2="375" y2="310"/>
    <line x1="440" y1="310" x2="760" y2="310"/>
    <line x1="825" y1="310" x2="1145" y2="310"/>
    <line x1="55" y1="500" x2="375" y2="500"/>
    <line x1="440" y1="500" x2="760" y2="500"/>
    <line x1="825" y1="500" x2="1145" y2="500"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff" font-size="22" font-weight="700">
    <text x="65" y="355">Who Can Write:</text>
    <text x="450" y="355">Who Can Write:</text>
    <text x="835" y="355">Who Can Write:</text>
    <text x="65" y="450">Who Can Read:</text>
    <text x="450" y="450">Who Can Read:</text>
    <text x="835" y="450">Who Can Read:</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    <rect x="65" y="372" width="290" height="46" rx="6" fill="#4b5f82" stroke="#92a8ca"/>
    <text x="210" y="402" text-anchor="middle" fill="#ffffff">Authenticated User</text>

    <rect x="65" y="467" width="290" height="46" rx="6" fill="url(#green)" stroke="#78c98d"/>
    <text x="210" y="497" text-anchor="middle" fill="#ffffff">Everyone</text>

    <rect x="450" y="372" width="290" height="46" rx="6" fill="#4b5f82" stroke="#92a8ca"/>
    <text x="595" y="402" text-anchor="middle" fill="#ffffff">Authenticated User</text>

    <rect x="450" y="467" width="290" height="46" rx="6" fill="#4b5f82" stroke="#92a8ca"/>
    <text x="595" y="497" text-anchor="middle" fill="#ffffff">Authenticated User</text>

    <rect x="835" y="372" width="290" height="46" rx="6" fill="url(#orange)" stroke="#ffd08a"/>
    <text x="980" y="402" text-anchor="middle" fill="#ffffff">Everyone</text>

    <rect x="835" y="467" width="290" height="46" rx="6" fill="#4b5f82" stroke="#92a8ca"/>
    <text x="980" y="497" text-anchor="middle" fill="#ffffff">Authenticated User</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff" font-size="52">
    <text x="115" y="590" text-anchor="middle">🧑</text>
    <text x="285" y="590" text-anchor="middle">👥</text>
    <text x="500" y="590" text-anchor="middle">🧑</text>
    <text x="700" y="590" text-anchor="middle">🧑</text>
    <text x="885" y="590" text-anchor="middle">👥</text>
    <text x="1085" y="590" text-anchor="middle">🧑</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff" font-size="18" font-weight="700">
    <text x="115" y="625" text-anchor="middle">Authenticated</text>
    <text x="115" y="647" text-anchor="middle">User</text>
    <text x="285" y="635" text-anchor="middle">Everyone</text>

    <text x="500" y="625" text-anchor="middle">Authenticated User</text>
    <text x="700" y="625" text-anchor="middle">Authenticated User</text>

    <text x="885" y="635" text-anchor="middle">Everyone</text>
    <text x="1085" y="625" text-anchor="middle">Authenticated User</text>
  </g>

  <g stroke="#dfe9f8" stroke-width="8" stroke-linecap="round" fill="none">
    <line x1="145" y1="575" x2="235" y2="575"/>
    <polygon points="235,575 220,565 220,585" fill="#dfe9f8" stroke="none"/>
    <line x1="535" y1="575" x2="665" y2="575"/>
    <polygon points="535,575 550,565 550,585" fill="#dfe9f8" stroke="none"/>
    <polygon points="665,575 650,565 650,585" fill="#dfe9f8" stroke="none"/>
    <line x1="920" y1="575" x2="1050" y2="575"/>
    <polygon points="920,575 935,565 935,585" fill="#dfe9f8" stroke="none"/>
    <polygon points="1050,575 1035,565 1035,585" fill="#dfe9f8" stroke="none"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    <circle cx="145" cy="607" r="17" fill="#2ea043"/>
    <text x="145" y="615" text-anchor="middle" fill="#ffffff">✓</text>
    <circle cx="535" cy="607" r="17" fill="#2ea043"/>
    <text x="535" y="615" text-anchor="middle" fill="#ffffff">✓</text>
    <circle cx="735" cy="607" r="17" fill="#2ea043"/>
    <text x="735" y="615" text-anchor="middle" fill="#ffffff">✓</text>
    <circle cx="1105" cy="607" r="17" fill="#2ea043"/>
    <text x="1105" y="615" text-anchor="middle" fill="#ffffff">✓</text>
  </g>
</svg>